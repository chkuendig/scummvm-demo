name: Build & Deploy to Hostinger 🚀

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

env:
  SCUMMVM_CONFIGURE: "--enable-release --enable-plugins --enable-all-engines --default-dynamic --enable-cloud"
  SCUMMVM_CONFIGURE_LIBS: " --enable-a52 --enable-faad --enable-fluidlite --enable-freetype2 --enable-fribidi --enable-gif --enable-gif --enable-jpeg --enable-jpeg --enable-mad --enable-mad --enable-mikmod --enable-mpcdec --enable-mpeg2 --enable-ogg --enable-png --enable-retrowave --enable-theoradec --enable-vorbis --enable-vpx --enable-zlib"
  EMSDK_VERSION: "6.0.2"
  DATA_BASEURL: "https://scummvm-data.kuendig.io"
  # Extra link flags for Sentry wasm symbolication + catchable OOM. configure
  # honors env LDFLAGS (seeds both the executable and plugin links), so no
  # scummvm/configure edit is needed. -Wl,--build-id is REQUIRED (emcc 4.0.15
  # does not emit a wasm build_id on its own; verified offline). -gseparate-dwarf
  # keeps the shipped wasm lean while producing <name>.debug.wasm sidecars to
  # upload. -sABORTING_MALLOC=1 makes OOM abort catchably (ALLOW_MEMORY_GROWTH
  # otherwise flips its default to 0).
  EXTRA_LDFLAGS: "-gseparate-dwarf -Wl,--build-id -sABORTING_MALLOC=1"
  
jobs:
  build-scummvm:
    name: Build ScummVM 🔧
    runs-on: ubuntu-latest
    steps:
      - name: Checkout  🛎️
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Patch Cloud URL 🩹
        run: |
          grep -rl --include \*.cpp --include \*.js 'cloud.scummvm.org' scummvm/ | xargs sed -i 's/cloud.scummvm.org/scummvm-cloud.kuendig.io/g'  
      - name: Define some cache keys 🗝️
        run: |
          echo "${SCUMMVM_CONFIGURE} ${SCUMMVM_CONFIGURE_LIBS} ${EXTRA_LDFLAGS}" > config_vars.txt
          echo "${SCUMMVM_CONFIGURE_LIBS}" > config_lib_vars.txt
          echo "SCUMMVM_COMMIT=$(git rev-parse @:./scummvm)" >> $GITHUB_ENV
      - uses: actions/cache@v4 ##todo: we should cache also the object files (and save/update them across runs)
        name: Cache Emscripten SDK 🔨
        with:
          path: scummvm/dists/emscripten/emsdk-* # Cache the Emscripten SDK
          key: emsdk-${{ env.EMSDK_VERSION }}
      - uses: actions/cache@v4
        name: Cache Dependencies 📦
        id: cache-libs
        with:
          path: scummvm/dists/emscripten/libs/build
          key: scummvm-libs-${{ env.EMSDK_VERSION }}-${{ hashFiles('config_lib_vars.txt') }}
      - uses: actions/cache@v4
        name: Cache configure artifacts 📦
        id: cache-configure
        with:
          # we need to cache the configure scripts as well so the timestamps are correct and don't cause a re-configure. 
          path: |
            scummvm/configure
            scummvm/engines.awk
            scummvm/engines/*/configure.engine 
            scummvm/config.h 
            scummvm/config.mk 
            scummvm/config.log 
            scummvm/configure.stamp 
            scummvm/engines/engines.mk 
            scummvm/engines/detection_table.h 
            scummvm/engines/plugins_table.h
          key: scummvm-configure-${{ env.SCUMMVM_COMMIT}}-${{ hashFiles('config_vars.txt') }}-${{ hashFiles('config_lib_vars.txt') }}
     
      - uses: actions/cache@v4 
        name: Cache Build artifacts 📦
        id: cache-build
        with:
          path: |
            scummvm/build-emscripten/
            scummvm/**/lib*.a  
            scummvm/**/*.o
          key: build-emscripten-${{ env.SCUMMVM_COMMIT}}-${{ hashFiles('config_vars.txt') }}-${{ hashFiles('config_lib_vars.txt') }}

      - if: ${{ steps.cache-configure.outputs.cache-hit != 'true' }}
        name: Configure ScummVM
        # LDFLAGS is honored by scummvm/configure (seeds executable + plugin
        # links) so we get -gseparate-dwarf/-Wl,--build-id/-sABORTING_MALLOC
        # without editing configure. Libs are cached separately and unaffected.
        env:
          LDFLAGS: ${{ env.EXTRA_LDFLAGS }}
        run: cd scummvm && dists/emscripten/build.sh configure ${SCUMMVM_CONFIGURE} ${SCUMMVM_CONFIGURE_LIBS} && cd ..
      - if: ${{ steps.cache-build.outputs.cache-hit != 'true' }}
        name: "Building ScummVM"
        run: |
          find scummvm/dists/emscripten/libs/build
          echo "Building scummvm-${SCUMMVM_COMMIT}"
          cd scummvm && dists/emscripten/build.sh make dist
          cp build-emscripten/scummvm.html build-emscripten/index.html && cp AUTHORS build-emscripten/ && cp COPYING build-emscripten/ && cp LICENSES/* build-emscripten/ && cp COPYRIGHT build-emscripten/ && cp NEWS* build-emscripten/ && cp README* build-emscripten/
      - name: Upload debug info to Sentry 🔎
        # Uploads the -gseparate-dwarf sidecars (main module + every plugin,
        # each carrying a matching build_id) so Sentry can symbolicate wasm
        # frames. Only runs on a fresh build (the sidecars only exist then) and
        # is a no-op without the token. Release id = the wasm hash (same value
        # the deploy stamps onto scummvm.js and passes to the client SDK).
        if: ${{ steps.cache-build.outputs.cache-hit != 'true' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then echo "no SENTRY_AUTH_TOKEN; skipping"; exit 0; fi
          mapfile -t DBG < <(find scummvm -name '*.debug.wasm')
          if [ ${#DBG[@]} -eq 0 ]; then echo "no *.debug.wasm found (cached build?); skipping"; exit 0; fi
          curl -sSL -o ./sentry-cli "https://github.com/getsentry/sentry-cli/releases/latest/download/sentry-cli-Linux-x86_64" && chmod +x ./sentry-cli
          REL=$(sha1sum scummvm/build-emscripten/scummvm.wasm | cut -c1-12)
          echo "Sentry release $REL, uploading ${#DBG[@]} debug files"
          ./sentry-cli releases new "$REL" || true
          ./sentry-cli debug-files upload "${DBG[@]}" || true
          # JS source maps so JS-level frames symbolicate too: the emscripten
          # glue (scummvm.js, not minified) + our minified Sentry bundle + its map.
          ./sentry-cli sourcemaps upload --release "$REL" --url-prefix '~' \
            scummvm/build-emscripten/scummvm.js sentry/sentry.bundle.js sentry/sentry.bundle.js.map || true
          ./sentry-cli releases finalize "$REL" || true
      - name: Save Build
        uses: actions/cache/save@v4
        with:
          path: |
            scummvm/build-emscripten/
          key: build-emscripten-${{ github.run_id }}
  update-icons:
    name: Update Icons 🎨
    runs-on: ubuntu-latest
    steps:
      - name: Checkout  🛎️
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Define  cache keys 🗝️
        run: |
          echo "SCUMMVM_ICONS_COMMIT=$(git rev-parse @:./scummvm-icons)" >> $GITHUB_ENV
          echo "SCUMMVM_ICONS_COMMIT=${SCUMMVM_ICONS_COMMIT}"  
      - uses: actions/cache@v4
        id: cache-icons
        with:
            path: scummvm/build-emscripten/data/gui-icons
            key: gui-icons-${{ env.SCUMMVM_ICONS_COMMIT }}-${{ hashFiles('assets/metadata.json') }}
      - if: ${{ steps.cache-icons.outputs.cache-hit != 'true' }}
        run: |
          sed -i 's/scummvm\/scummvm-icons/chkuendig\/scummvm-icons/g' scummvm-icons/gen-set.py
          scripts/update-icons.sh
          python3 scummvm/dists/emscripten/build-make_http_index.py scummvm/build-emscripten/data/
  sync-games:
    name: Sync Games 🎮
    runs-on: ubuntu-latest
    steps:
      - name: Checkout  🛎️
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Sync Games 🔄
        run: |
          scripts/sync-games.sh
        env:
          SSH_USER:  ${{ secrets.HOSTINGER_SSH_USERNAME }}
          SSH_PASSWORD:  ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          SSH_HOST:  ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT:  ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_PATH:   "/home/${{ secrets.HOSTINGER_SSH_USERNAME }}/domains/scummvm-data.kuendig.io/public_html"
      - name: Save Games Metadata
        uses: actions/cache/save@v4
        with:
          path: |
            scummvm/build-emscripten/games.json
          key: games-metadata-${{ github.run_id }}
  deploy-cloud:
    name: Deploy Cloud Backend ☁️
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout  🛎️
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup Composer 📦
        uses: "php-actions/composer@v6"
        with:
          php_version: "7.3.33"
          version: "2.8.5"
          working_dir: "scummvm-cloud"
      - name: Create .env file 💾 # encode with echo "$(cat scummvm-cloud/public/.env)"  | base64 -w 0
        run: printf "${{ secrets.CLOUD_ENV }}" | base64 -d > scummvm-cloud/public/.env
      - name: Patch Cloud URL 🩹
        run: grep -rl --include \*.php 'cloud.scummvm.org' scummvm-cloud/ | xargs sed -i 's/cloud.scummvm.org/scummvm-cloud.kuendig.io/g'  
      - name: Create .htaccess file 💾 
        run: printf 'RewriteEngine On\nRewriteRule ^(.*)$ ./public/$1 [L]\n' > scummvm-cloud/.htaccess
      - name: Upload to Hostinger ☁️
        uses: appleboy/scp-action@v0.1.7
        with:
          source: "scummvm-cloud/templates/*,scummvm-cloud/vendor/*,scummvm-cloud/src/*,scummvm-cloud/public/*, scummvm-cloud/.htaccess"
          target: ~/domains/scummvm-cloud.kuendig.io/public_html
          rm: true
          strip_components: 1
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USERNAME }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}

  deploy-demo:
    name: Deploy Demo Page 🚀
    runs-on: ubuntu-latest
    needs:  [update-icons, sync-games, build-scummvm] # [detect-games, update-icons]
    steps:
      - name: Checkout  🛎️
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Define  cache keys 🗝️
        run: |
            echo "SCUMMVM_ICONS_COMMIT=$(git rev-parse @:./scummvm-icons)" >> $GITHUB_ENV
            echo "${DOWNLOAD_GAMES}" > download_games.txt
      - name: Restore ScummVM build
        uses: actions/cache/restore@v4
        with:
          path: scummvm/build-emscripten/
          key: build-emscripten-${{ github.run_id }}
      - name: Restore icons
        uses: actions/cache/restore@v4
        with:
          path: scummvm/build-emscripten/data/gui-icons
          key: gui-icons-${{ env.SCUMMVM_ICONS_COMMIT }}-${{ hashFiles('assets/metadata.json') }}
      - name: Restore Games Metadata
        uses: actions/cache/restore@v4
        with:
          path: |
            scummvm/build-emscripten/games.json
          key: games-metadata-${{ github.run_id }}
      # - name: "Restore scummvm.ini"
      #   uses: actions/cache/restore@v4
      #   with:
      #     path: |
      #       scummvm/build-emscripten/scummvm.ini
      #       scummvm/build-emscripten/index.json
      #     key: scummvm-ini-${{ github.run_id }}
      # - name: "Restore games"
      #   uses: actions/cache/restore@v4
      #   with:
      #     path: scummvm/build-emscripten/data/games
      #     key: games-${{ hashFiles('download_games.txt') }}
      - name:  update baseURL
        run: |
          jq '.games +=  {"baseUrl":"${{ env.DATA_BASEURL }}"}' scummvm/build-emscripten/data/index.json > scummvm/build-emscripten/data/index.json.tmp && mv scummvm/build-emscripten/data/index.json.tmp scummvm/build-emscripten/data/index.json
      - name: Cache-bust scummvm.js URL with the wasm hash
        # Moved here from scummvm's emscripten.mk: stamp scummvm.js?v=<wasm hash>
        # so a returning visitor can't pair a fresh wasm with stale cached js
        # (WebAssembly LinkError). The Sentry step below reads this ?v= as the release.
        run: |
          VER=$(sha1sum scummvm/build-emscripten/scummvm.wasm | cut -c1-12)
          echo "cache-bust: scummvm.js?v=$VER"
          for f in scummvm/build-emscripten/scummvm.html scummvm/build-emscripten/index.html; do
            [ -f "$f" ] && sed -i "s|src=scummvm.js>|src=scummvm.js?v=$VER>|; s|src=\"scummvm.js\"|src=\"scummvm.js?v=$VER\"|" "$f"
          done
      - name: Write .htaccess (wasm MIME + no-cache app-shell)
        # Authored fully here. Previously scummvm shipped an .htaccess but this
        # step overwrote it with only the MIME type; now it carries both the
        # wasm MIME and the no-cache headers (fallback to the URL stamp above).
        run: |
          {
            echo "AddType application/wasm wasm so"
            echo '<IfModule mod_headers.c>'
            echo '  <FilesMatch "\.(html|js|wasm|so)$">'
            echo '    Header unset Cache-Control'
            echo '    Header always set Cache-Control "no-cache, must-revalidate"'
            echo '  </FilesMatch>'
            echo '</IfModule>'
            echo '<IfModule mod_expires.c>'
            echo '  ExpiresActive On'
            echo '  ExpiresByType text/javascript "access plus 0 seconds"'
            echo '  ExpiresByType application/javascript "access plus 0 seconds"'
            echo '  ExpiresByType application/wasm "access plus 0 seconds"'
            echo '</IfModule>'
          } > scummvm/build-emscripten/.htaccess
      - name: Copy default scummvm.ini
        run: |
          cp assets/scummvm.ini scummvm/build-emscripten/scummvm.ini
      - name: Copy games listing assets
        run: |
          cp assets/games.* scummvm/build-emscripten/
          cp assets/games-*.html assets/games-v2.* scummvm/build-emscripten/
          cp assets/metadata.json scummvm/build-emscripten/metadata.json
          cp assets/main.css scummvm/build-emscripten/main.css
          cp assets/*.png scummvm/build-emscripten/
      - name: Inject Sentry error tracking 🛡️
        # Injects the bundled @sentry/browser + @sentry/wasm SDK (sentry/sentry.bundle.js,
        # committed in this repo). The wasm integration - required to symbolicate wasm
        # stack frames against the debug files uploaded by the build job - is NOT in the
        # CDN Loader, so we ship our own bundle. Config is passed via window.__SENTRY_CFG__;
        # release = the wasm-hash already stamped onto the scummvm.js URL, so events line up
        # with the uploaded debug files. No-op if SENTRY_DSN is unset.
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT }}
        run: |
          if [ -z "$SENTRY_DSN" ]; then echo "SENTRY_DSN not set; skipping Sentry injection"; exit 0; fi
          cp sentry/sentry.bundle.js scummvm/build-emscripten/
          REL=$(grep -oE 'scummvm\.js\?v=[a-f0-9]+' scummvm/build-emscripten/scummvm.html | head -1 | sed 's/.*v=//')
          cfg="<script>window.__SENTRY_CFG__={dsn:'${SENTRY_DSN}',release:'${REL}',environment:'${SENTRY_ENVIRONMENT:-production}'};</script>"
          snippet="${cfg}<script src=\"sentry.bundle.js\"></script>"
          for f in scummvm/build-emscripten/index.html scummvm/build-emscripten/scummvm.html; do
            [ -f "$f" ] && sed -i "s#</head>#${snippet}</head>#" "$f" && echo "Injected Sentry into $f (release ${REL:-none})"
          done
      - uses: JamesIves/github-pages-deploy-action@v4.7.2
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: scummvm/build-emscripten # The folder the action should deploy.
      - name: Upload to Hostinger ☁️
        uses: appleboy/scp-action@v0.1.7
        with:
          source: "scummvm/build-emscripten/*,scummvm/build-emscripten/.htaccess"
          target: ~/domains/scummvm.kuendig.io/public_html
          rm: true
          strip_components: 2
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USERNAME }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
      - name: Archive website artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-emscripten
          path: |
            scummvm/build-emscripten